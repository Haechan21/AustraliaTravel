---
layout: default
title: 관광지 랭킹
---

<div class="rankings-page">
  <h1>관광지 랭킹</h1>
  <p class="rankings-subtitle" id="subtitle">로딩 중...</p>

  <!-- Grade filters -->
  <div class="grade-filters" id="gradeFilters">
    <button class="grade-btn active" data-grade="all">전체등급</button>
    <button class="grade-btn grade-S" data-grade="S">S등급</button>
    <button class="grade-btn grade-A" data-grade="A">A등급</button>
    <button class="grade-btn grade-B" data-grade="B">B등급</button>
    <button class="grade-btn grade-C" data-grade="C">C등급</button>
    <button class="grade-btn grade-D" data-grade="D">D등급</button>
  </div>

  <!-- Region filter -->
  <div class="region-filter-wrap">
    <select id="regionFilter" class="region-select">
      <option value="all">모든 지역</option>
    </select>
    <label class="controversy-toggle">
      <input type="checkbox" id="controversyFilter" />
      논쟁 장소만
    </label>
  </div>

  <!-- Sort -->
  <div class="sort-wrap">
    <span class="sort-label">정렬:</span>
    <button class="sort-btn active" data-sort="rank">종합순위</button>
    <button class="sort-btn" data-sort="A">①효율 전략가순</button>
    <button class="sort-btn" data-sort="B">②감성 탐험가순</button>
    <button class="sort-btn" data-sort="C">③현실주의 비평가순</button>
    <button class="sort-btn" data-sort="spread">편차</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="rankings-table">
      <thead>
        <tr>
          <th class="col-rank">#</th>
          <th class="col-grade">등급</th>
          <th class="col-score">점수</th>
          <th class="col-abc">①효율 전략가</th>
          <th class="col-abc">②감성 탐험가</th>
          <th class="col-abc">③현실주의 비평가</th>
          <th class="col-name">장소</th>
          <th class="col-region">지역</th>
        </tr>
      </thead>
      <tbody id="rankingsBody">
      </tbody>
    </table>
  </div>

  <p class="rankings-footer">
    클릭하면 상세 평가를 볼 수 있습니다.
    <br/>
    <small>①평가자1: 효율 전략가 · ②평가자2: 감성 탐험가 · ③평가자3: 현실주의 비평가</small>
  </p>
</div>

<script>window.__BASE_URL__ = "{{ site.baseurl }}";</script>
<script src="{{ '/assets/js/rankings.js' | relative_url }}"></script>
